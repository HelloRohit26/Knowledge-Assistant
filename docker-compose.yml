services:
  # ── Backend Service (FastAPI + ChromaDB + SQLite) ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: knowledge_assistant_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CHROMA_DB_PATH=/app/chroma_db
      - DATA_FOLDER=/app/data
    volumes:
      - backend_chroma_data:/app/chroma_db
      - backend_db_data:/app/tracking_data
      - ./data:/app/data:ro
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/registry/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Frontend Service (React + Nginx Reverse Proxy) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: knowledge_assistant_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend_chroma_data:
    driver: local
  backend_db_data:
    driver: local
